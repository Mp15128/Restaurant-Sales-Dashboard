name: Generate Restaurant Data

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run data generator script
        run: python generate_data.py

      - name: Commit and push the generated dataset
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/restaurant_sales.csv
          git commit -m "Automated: Generate 1000 order dataset" || echo "No changes to commit"
          git push
